<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f0f1a">
  <title>拾光 — 碎片时间学习助手</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 顶部 -->
  <div class="header">
    <h1>✨ 拾光</h1>
    <span id="today-date" style="color: #8888aa; font-size: 13px;"></span>
  </div>

  <!-- ======== 首页视图 ======== -->
  <div id="view-home" class="view active">
    <div class="stats-grid">
      <div class="stat-card highlight">
        <div class="number" id="stat-due">0</div>
        <div class="label">待复习</div>
      </div>
      <div class="stat-card">
        <div class="number" id="stat-total">0</div>
        <div class="label">总卡片</div>
      </div>
      <div class="stat-card">
        <div class="number" id="stat-learned">0</div>
        <div class="label">已学会</div>
      </div>
      <div class="stat-card">
        <div class="number" id="stat-new">0</div>
        <div class="label">未学习</div>
      </div>
    </div>

    <button class="action-btn btn-primary" onclick="startReview()">
      📖 开始复习
    </button>
    <button class="action-btn btn-secondary" onclick="switchView('add')">
      ➕ 添加知识
    </button>
  </div>

  <!-- ======== 复习视图 ======== -->
  <div id="view-review" class="view">
    <div class="review-progress" id="review-progress">第 1/0 张</div>

    <div class="flashcard" id="flashcard" onclick="flipCard()">
      <div class="flashcard-inner" id="flashcard-inner">
        <div class="flashcard-front" id="card-front">加载中...</div>
        <div class="flashcard-back" id="card-back"></div>
      </div>
      <div class="hint" id="card-hint">点击翻转查看答案</div>
    </div>

    <div class="review-btns" id="review-btns" style="display: none;">
      <button class="review-btn forgot"   onclick="rateCard(0)">😵 忘了</button>
      <button class="review-btn fuzzy"    onclick="rateCard(2)">🤔 模糊</button>
      <button class="review-btn remember" onclick="rateCard(4)">😊 记住</button>
      <button class="review-btn perfect"  onclick="rateCard(5)">🚀 秒杀</button>
    </div>

    <div class="review-done" id="review-done" style="display: none;">
      <div class="emoji">🎉</div>
      <div class="msg">今日复习完成！</div>
      <button class="action-btn btn-primary" onclick="switchView('home')">返回首页</button>
    </div>
  </div>

  <!-- ======== 添加视图 ======== -->
  <div id="view-add" class="view">
    <!-- AI 自动拆卡 -->
    <div class="add-section">
      <h3>🤖 AI 智能拆卡</h3>
      <div class="input-group">
        <label>粘贴一段知识内容，AI 自动拆成问答卡片</label>
        <textarea id="ai-input" placeholder="例如：闭包是JavaScript中的一个重要概念。当一个函数在另一个函数内部定义时，内部函数可以访问外部函数的变量..."></textarea>
      </div>
      <div class="input-group">
        <label>生成几张卡片</label>
        <input type="text" id="ai-count" value="5" style="width: 80px;">
      </div>
      <button class="action-btn btn-primary" onclick="aiGenerate()">🤖 AI 拆卡</button>
      <div id="ai-loading" class="loading" style="display: none;">
        <div class="spinner"></div>
        <p>AI 正在拆解知识点...</p>
      </div>
      <div id="ai-preview" class="ai-cards-preview"></div>
    </div>

    <hr style="border-color: #252542; margin: 24px 0;">

    <!-- 手动添加 -->
    <div class="add-section">
      <h3>✏️ 手动添加</h3>
      <div class="input-group">
        <label>问题（正面）</label>
        <input type="text" id="manual-front" placeholder="例如：什么是闭包？">
      </div>
      <div class="input-group">
        <label>答案（背面）</label>
        <textarea id="manual-back" placeholder="例如：闭包是指函数能记住并访问它被创建时的变量环境..." style="min-height: 80px;"></textarea>
      </div>
      <div class="input-group">
        <label>标签（用逗号分隔）</label>
        <input type="text" id="manual-tags" placeholder="例如：JavaScript, 基础">
      </div>
      <button class="action-btn btn-secondary" onclick="manualAdd()">✏️ 添加卡片</button>
    </div>
  </div>

  <!-- 底部导航 -->
  <div class="bottom-nav">
    <button class="nav-item active" onclick="switchView('home')" data-view="home">
      <span class="icon">🏠</span>
      <span>首页</span>
    </button>
    <button class="nav-item" onclick="startReview()" data-view="review">
      <span class="icon">📖</span>
      <span>复习</span>
    </button>
    <button class="nav-item" onclick="switchView('add')" data-view="add">
      <span class="icon">➕</span>
      <span>添加</span>
    </button>
  </div>

  <!-- Toast 提示 -->
  <div class="toast" id="toast"></div>

  <script src="js/sm2.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
